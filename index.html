<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A neon retro memory card matching game built with HTML, CSS, and JavaScript." />
  <title>Memory Card Game</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="wrapper">

    <!-- ═══════════════════════════════
         HEADER
    ════════════════════════════════ -->
    <header>
      <h1 class="game-title">MEMORY</h1>
      <p class="game-tagline">Match the pairs · Train your brain</p>
    </header>


    <!-- ═══════════════════════════════
         CONTROLS PANEL
    ════════════════════════════════ -->
    <div class="controls-panel" role="toolbar" aria-label="Game controls">

      <!-- Difficulty selector -->
      <div class="difficulty-group" role="group" aria-label="Select difficulty">
        <span class="diff-label">Level:</span>
        <button class="diff-btn active" data-difficulty="easy"   aria-label="Easy — 4x4 grid">Easy</button>
        <button class="diff-btn"        data-difficulty="medium" aria-label="Medium — 4x6 grid">Medium</button>
        <button class="diff-btn"        data-difficulty="hard"   aria-label="Hard — 6x6 grid">Hard</button>
      </div>

      <!-- New Game button -->
      <button class="btn-new-game" id="btn-new-game" aria-label="Start a new game">
        ↺ New Game
      </button>

    </div>


    <!-- ═══════════════════════════════
         HUD — Stats Bar
    ════════════════════════════════ -->
    <div class="hud" role="status" aria-live="polite" aria-label="Game statistics">

      <div class="stat-box" id="moves-display">
        <span class="stat-label">Moves</span>
        <span class="stat-value" id="moves-value">0</span>
      </div>

      <div class="stat-box" id="timer-display">
        <span class="stat-label">Time</span>
        <span class="stat-value" id="timer-value">00:00</span>
      </div>

      <div class="stat-box" id="score-display">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="score-value">800</span>
      </div>

      <div class="stat-box" id="best-display">
        <span class="stat-label">Best</span>
        <span class="stat-value" id="best-score-value">—</span>
      </div>

    </div>


    <!-- ═══════════════════════════════
         GAME BOARD
         Cards are injected by game.js
    ════════════════════════════════ -->
    <main
      id="game-board"
      role="grid"
      aria-label="Memory card grid"
    >
      <!-- Cards rendered dynamically by game.js -->
    </main>


    <footer>
      <p>Click two cards to reveal them · Match all pairs to win</p>
    </footer>

  </div><!-- /.wrapper -->


  <!-- ═══════════════════════════════
       WIN MODAL
  ════════════════════════════════ -->
  <div
    class="modal-overlay"
    id="win-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title-text"
    aria-describedby="modal-description"
  >
    <div class="modal-box">

      <p class="modal-congrats">🎉 Congratulations!</p>
      <h2 class="modal-title" id="modal-title-text">YOU WIN!</h2>
      <div class="modal-stars" id="modal-stars" aria-label="Star rating">⭐⭐⭐</div>

      <div class="modal-stats" id="modal-description">
        <div class="modal-stat">
          <span class="modal-stat-label">Moves</span>
          <span class="modal-stat-value" id="modal-moves">—</span>
        </div>
        <div class="modal-stat">
          <span class="modal-stat-label">Time</span>
          <span class="modal-stat-value" id="modal-time">—</span>
        </div>
        <div class="modal-stat">
          <span class="modal-stat-label">Score</span>
          <span class="modal-stat-value" id="modal-score">—</span>
        </div>
        <div class="modal-stat">
          <span class="modal-stat-label">Best Score</span>
          <span class="modal-stat-value" id="modal-best">—</span>
        </div>
      </div>

      <button class="btn-play-again" id="btn-play-again" aria-label="Play again">
        ↺ Play Again
      </button>

    </div>
  </div>


  <!-- ═══════════════════════════════
       SCRIPTS
  ════════════════════════════════ -->
  <!-- Card data must load before game engine -->
  <script src="js/cards.js"></script>
  <script src="js/game.js"></script>

</body>
</html>
